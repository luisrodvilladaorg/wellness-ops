name: Frontend CD (Kubernetes)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-frontend:
    runs-on: self-hosted
    env:
      KUBECONFIG: /opt/kubeconfig-ci.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize kubeconfig endpoint
        run: |
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          SERVER_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')

          if [[ "$SERVER_URL" == *"0.0.0.0"* ]]; then
            kubectl config set-cluster "$CLUSTER_NAME" --server="${SERVER_URL/0.0.0.0/127.0.0.1}"
          fi

      - name: Set frontend image version
        run: |
          kubectl set image deployment/frontend \
            frontend-deployment=ghcr.io/luisrodvilladaorg/wellness-ops-frontend:${GITHUB_REF_NAME}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Verify frontend availability
        run: |
          curl -fsS http://wellness.local || curl -kfsS https://wellness.local

name: Frontend CD (Kubernetes)

on:
  workflow_run:
    workflows: ["Frontend Image CI (Kubernetes)"]
    types:
      - completed

jobs:
  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    env:
      KUBECONFIG: /opt/kubeconfig-ci.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for image in GHCR
        run: |
          IMAGE="ghcr.io/luisrodvilladaorg/wellness-ops-frontend:${GITHUB_REF_NAME}"

          echo "Waiting for image $IMAGE"

          for i in {1..180}; do
            if docker manifest inspect $IMAGE > /dev/null 2>&1; then
              echo "Image found in GHCR"
              exit 0
            fi

            echo "Image not available yet, retrying..."
            sleep 10
          done

          echo "Timeout waiting for image"
          exit 1

      - name: Set frontend image version
        run: |
          kubectl set image deployment/frontend \
            frontend-deployment=ghcr.io/luisrodvilladaorg/wellness-ops-frontend:${GITHUB_REF_NAME}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend --timeout=300s

      - name: Verify frontend availability
        run: |
          curl -k https://wellness.local

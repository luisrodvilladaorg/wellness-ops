name: Stack DOWN (Production)

# ❗ This workflow does NOT run on push
# ❗ Manual trigger only from GitHub Actions
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DOWN to confirm stack shutdown"
        required: true
        default: ""

jobs:
  shutdown:
    name: Stop production stack
    runs-on: self-hosted
    environment: production

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DOWN" ]; then
            echo "❌ Confirmation failed. Type DOWN to proceed."
            exit 1
          fi

      - name: Show runner info
        run: |
          hostname
          whoami
          pwd

      - name: Ensure clean repo state
        run: |
          cd /opt/wellness-ops
          git fetch origin main
          git reset --hard origin/main

      - name: Stop Docker Compose stack
        run: |
          cd /opt/wellness-ops
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

      - name: Show running containers
        run: docker ps

      - name: Execution proof
        run: |
          echo "🧨 STACK STOPPED"
          date

      - name: Ensure clean repo state
        run: |
          cd /opt/wellness-ops
          git fetch origin main --prune
          git reset --hard origin/main

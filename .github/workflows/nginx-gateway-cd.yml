name: Nginx Gateway CD (Kubernetes)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-nginx-gateway:
    runs-on: self-hosted
    env:
      KUBECONFIG: /opt/kubeconfig-ci.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize kubeconfig endpoint
        run: |
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          SERVER_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')

          if [[ "$SERVER_URL" == *"0.0.0.0"* ]]; then
            kubectl config set-cluster "$CLUSTER_NAME" --server="${SERVER_URL/0.0.0.0/127.0.0.1}"
          fi

      - name: Set nginx gateway image version
        run: |
          kubectl set image deployment/nginx-gateway \
            nginx=ghcr.io/luisrodvilladaorg/wellness-ops-nginx-gateway:${GITHUB_REF_NAME}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nginx-gateway --timeout=120s

      - name: Verify gateway routing
        run: |
          curl -fsS http://wellness.local/api/health || curl -kfsS https://wellness.local/api/health

name: Stack ROLLBACK (Production)

# ❗ Manual and controlled rollback
on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Git commit SHA or tag to rollback to (e.g. v1.2.3 or 9f3a1c2)"
                required: true
            confirm:
                description: "Type ROLLBACK to confirm"
                required: true
                default: ""

jobs:
    rollback:
        name: Rollback production stack
        runs-on: self-hosted
        environment: production

        steps:
            # 1️⃣ Strict safety check
            - name: Validate confirmation
              env:
                CONFIRM: ${{ github.event.inputs.confirm }}
              run: |
                  if [ "$CONFIRM" != "ROLLBACK" ]; then
                    echo "❌ Confirmation failed. Type ROLLBACK to proceed."
                    exit 1
                  fi

            # 2️⃣ Runner info
            - name: Show runner info
              run: |
                  hostname
                  whoami
                  pwd
                  docker version
                  docker compose version

            # 3️⃣ Fetch repository and sync
            - name: Fetch repository
              run: |
                  cd /opt/wellness-ops
                  git fetch --all --tags

            # 4️⃣ Validate ref and checkout
            - name: Checkout rollback ref
              env:
                REF: ${{ github.event.inputs.ref }}
              run: |
                  if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] && \
                     [[ ! "$REF" =~ ^[0-9a-f]{40}$ ]]; then
                    echo "❌ Invalid ref format: '$REF'"
                    echo "   Accepted formats:"
                    echo "   - Semver tag : v1.2.3"
                    echo "   - Full SHA   : 9f3a1c2d... (40 hex chars)"
                    exit 1
                  fi
                  echo "✅ Ref validated: $REF"
                  cd /opt/wellness-ops
                  git reset --hard "$REF"

            # 5️⃣ Pull matching images
            - name: Pull images
              run: |
                  cd /opt/wellness-ops
                  docker compose -f docker-compose.prod.yml pull

            # 6️⃣ Start rollback stack
            - name: Deploy rollback stack
              run: |
                  cd /opt/wellness-ops
                  docker compose -f docker-compose.prod.yml up -d

            # 7️⃣ Show running containers
            - name: Show running containers
              run: docker ps

            # 8️⃣ Wait for services
            - name: Wait for services
              run: sleep 10

            # 9️⃣ Basic health checks
            - name: Backend healthcheck
              run: curl -fsS http://localhost/api/health

            - name: Nginx healthcheck
              run: curl -fsS http://localhost/
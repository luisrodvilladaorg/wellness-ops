name: Build & Push Images (DEV)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/luisrodvilladaorg/wellness-ops-frontend
  IMAGE_BACKEND: ghcr.io/luisrodvilladaorg/wellness-ops-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build-frontend:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Validate frontend files
        run: |
          test -f frontend/Dockerfile.prod
          test -d frontend/mi-web

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build & push frontend image
        run: |
          docker buildx build \
          --cache-from=type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache \
          --cache-to=type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max \
          -f frontend/Dockerfile.prod \
          -t ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }} \
          frontend \
          --push

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: luisrodvilladaorg/wellness-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: wellness-gitops

      - name: Update frontend image in DEV overlay
        run: |
          cd wellness-gitops/k8s/overlays/dev/frontend
          sed -i "s|image: .*|image: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}|" frontend-deployment.yml

      - name: Commit & push changes (frontend)
        run: |
          cd wellness-gitops
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add k8s/overlays/dev/frontend/frontend-deployment.yml
          git commit -m "dev: update frontend image to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push

  build-backend:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Validate backend files
        run: |
          test -f backend/Dockerfile.prod
          test -f backend/package.json
          test -d backend/src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build & push backend image
        run: |
          docker buildx build \
          --build-arg APP_VERSION=${{ env.IMAGE_TAG }} \
          --build-arg GIT_SHA=${{ github.sha }} \
          --cache-from=type=registry,ref=${{ env.IMAGE_BACKEND }}:cache \
          --cache-to=type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max \
          -f backend/Dockerfile.prod \
          -t ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }} \
          backend \
          --push

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: luisrodvilladaorg/wellness-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: wellness-gitops

      - name: Update backend image in DEV overlay
        run: |
          cd wellness-gitops/k8s/overlays/dev/backend
          sed -i "s|image: .*|image: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}|" backend-deployment.yml

      - name: Commit & push changes (backend)
        run: |
          cd wellness-gitops
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add k8s/overlays/dev/backend/backend-deployment.yml
          git commit -m "dev: update backend image to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push
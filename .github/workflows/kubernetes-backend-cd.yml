name: Backend CD (Kubernetes)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-backend:
    runs-on: self-hosted

    env:
      KUBECONFIG: /opt/kubeconfig-ci.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for image in GHCR
        run: |
          IMAGE="ghcr.io/luisrodvilladaorg/wellness-ops-backend:${GITHUB_REF_NAME}"

          echo "Waiting for image $IMAGE"

          for i in {1..60}; do
            if docker manifest inspect $IMAGE > /dev/null 2>&1; then
              echo "Image found in GHCR"
              exit 0
            fi

            echo "Image not available yet, retrying..."
            sleep 10
          done

          echo "Timeout waiting for image"
          exit 1

      - name: Set backend image version
        run: |
          kubectl set image deployment/backend \
            backend=ghcr.io/luisrodvilladaorg/wellness-ops-backend:${GITHUB_REF_NAME}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=900s

      - name: Verify backend health
        run: |
          curl -k https://wellness.local/api/health